services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
 
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
 
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL
      - REDIS_URL
      - OPENAI_API_KEY
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_WEBHOOK_SECRET
      - SERPER_API_KEY
      - ENVIRONMENT=production
    command: >
      sh -c "alembic upgrade head &&
             uvicorn clients.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
 
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL
      - REDIS_URL
      - OPENAI_API_KEY
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_WEBHOOK_SECRET
      - SERPER_API_KEY
      - ENVIRONMENT=production
    command: python -m arq infra.worker.worker_settings.WorkerSettings
 
volumes:
  pgdata: {}